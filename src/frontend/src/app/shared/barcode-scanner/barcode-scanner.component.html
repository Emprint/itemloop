<div class="barcode-scanner-overlay">
  <div class="barcode-scanner-modal">
    <div class="barcode-scanner-header">
      <h2>{{ 'BARCODE_SCANNER.TITLE' | translate }}</h2>
      <button class="close-btn" (click)="onClose()" aria-label="Close">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="barcode-scanner-content">
      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() | translate }}
        </div>
      }

      @if (isScanning()) {
        <div class="video-container">
          <video #videoElement class="scanner-video" playsinline></video>
          <div class="scan-overlay">
            <div class="scan-line"></div>
          </div>
        </div>
        <p class="scan-instruction">{{ 'BARCODE_SCANNER.INSTRUCTION' | translate }}</p>
      } @else if (!hasCameraPermission()) {
        <div class="permission-message">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
            ></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          <p>{{ 'BARCODE_SCANNER.PERMISSION_REQUIRED' | translate }}</p>
        </div>
      }
    </div>

    <div class="barcode-scanner-footer">
      <button class="btn-secondary" (click)="onClose()">
        {{ 'BARCODE_SCANNER.CANCEL' | translate }}
      </button>
    </div>
  </div>
</div>
