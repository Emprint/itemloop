<form class="form-card" [formGroup]="form" (ngSubmit)="submit()">
  <h2>{{ 'LOGIN' | translate }}</h2>
  <div class="form-field">
    <label for="email"
      ><span>{{ 'EMAIL' | translate }} <span class="req">*</span></span></label
    >
    <input type="email" formControlName="email" id="email" required autocomplete="email" />
  </div>
  <div class="form-field">
    <label for="password"
      ><span>{{ 'PASSWORD' | translate }} <span class="req">*</span></span></label
    >
    <input
      type="password"
      formControlName="password"
      id="password"
      required
      autocomplete="current-password"
    />
  </div>
  <div class="buttons-list">
    <a class="btn-outline" routerLink="/">{{ 'CANCEL' | translate }}</a>
    <button type="submit">{{ 'LOGIN' | translate }}</button>
  </div>
  @if (error()) {
    <div class="error">{{ error() }}</div>
  }
  <div class="link">
    <span>{{ 'NO_ACCOUNT' | translate }}</span>
    <a routerLink="/auth/register">{{ 'REGISTER' | translate }}</a>
  </div>
</form>
